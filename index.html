<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RE:CORD - Sync Prototype</title>
  <style>
    :root {
      --accent: #00f2ff;
      --accent-soft: rgba(0, 242, 255, 0.24);
      --danger: #ff4d6d;
      --ok: #58ff9a;
      --gold: #ffe066;
      --bg: #0b0b0d;
      --bg2: #151419;
      --ink: #f8f7f2;
      --muted: #9da1a6;
      --line: rgba(255, 255, 255, 0.16);
      --panel: rgba(255, 255, 255, 0.055);
      --sampler-black: #09090a;
      --sampler-face: #17171a;
      --sampler-edge: #343136;
      --sampler-screen: rgba(0, 12, 14, 0.84);
      --sampler-groove: rgba(255, 255, 255, 0.07);
      color-scheme: dark;
      font-family: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      --top-area-height: 40dvh;
      --bottom-chrome-height: 112px;
      --board-size: min(492px, calc(100vw - 28px), calc(100dvh - var(--top-area-height) - var(--bottom-chrome-height)));
      margin: 0;
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(0, 242, 255, 0.12), transparent 28%),
        radial-gradient(circle at 86% 52%, rgba(255, 77, 184, 0.1), transparent 24%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 16px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 14px),
        linear-gradient(180deg, #070708 0%, #111114 42%, #020202 100%);
      color: var(--ink);
      position: relative;
      display: grid;
      grid-template-rows: var(--top-area-height) 1fr;
    }

    body[data-pulse="1"] #char-container {
      animation: char-beat-bounce 180ms cubic-bezier(0.2, 0.82, 0.26, 1) both;
    }

    body[data-pulse="1"] #sound-wave .wave-row {
      opacity: calc(var(--o) + 0.34);
      transform: translate(-50%, -50%) scaleY(1.18);
    }

    body[data-pulse="1"] #analyze-target strong {
      transform: translateY(-18px) scale(1.04);
    }

    body[data-phase="execute"] {
      background:
        radial-gradient(circle at 50% 16%, rgba(0, 242, 255, 0.18), transparent 34%),
        radial-gradient(circle at 82% 52%, rgba(88, 255, 154, 0.08), transparent 24%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 16px),
        linear-gradient(180deg, #08090d 0%, #10151a 47%, #000 100%);
    }

    body[data-evolution="1"] { --accent: #ff4db8; --accent-soft: rgba(255, 77, 184, 0.24); }
    body[data-evolution="2"] { --accent: #58ff9a; --accent-soft: rgba(88, 255, 154, 0.22); }
    body[data-evolution="3"] { --accent: #ffe066; --accent-soft: rgba(255, 224, 102, 0.2); }

    body[data-miss-danger="1"] #miss-danger-vignette {
      opacity: var(--miss-danger-opacity, 0.34);
    }

    body[data-pulse="1"][data-miss-danger="1"] #miss-danger-vignette {
      animation: miss-danger-beat 300ms ease-out both;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    #settings-btn {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      z-index: 20;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.32), transparent 0 16%),
        radial-gradient(circle at center, rgba(0, 242, 255, 0.12), transparent 0 44%),
        conic-gradient(from 32deg, #222, #5c555b, #151517, #3a3639, #222);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      display: grid;
      place-items: center;
      box-shadow:
        inset 0 0 0 3px rgba(0, 0, 0, 0.34),
        inset 0 -10px 18px rgba(0, 0, 0, 0.5),
        0 10px 24px rgba(0, 0, 0, 0.42);
      transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    #settings-btn:hover,
    #settings-btn:focus-visible {
      border-color: var(--accent);
      color: var(--accent);
      outline: none;
      transform: rotate(18deg);
    }

    #soul-layer {
      position: fixed;
      inset: 0;
      z-index: 18;
      overflow: hidden;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    #miss-danger-vignette {
      position: fixed;
      inset: -5vmax;
      z-index: 17;
      pointer-events: none;
      opacity: 0;
      border-radius: 6vmax;
      background:
        radial-gradient(ellipse at center, transparent 0 52%, rgba(255, 53, 83, 0.1) 62%, rgba(255, 38, 68, 0.34) 82%, rgba(255, 0, 46, 0.62) 100%);
      box-shadow:
        inset 0 0 46px rgba(255, 0, 46, 0.38),
        inset 0 0 96px rgba(255, 47, 82, 0.34);
      filter: blur(16px) saturate(1.18);
      transform: scale(1);
      transition: opacity 320ms ease, filter 320ms ease;
      mix-blend-mode: screen;
      will-change: opacity, transform, filter;
    }

    #top-area {
      position: relative;
      min-width: 0;
      overflow: hidden;
      display: grid;
      place-items: end center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.055), transparent 24% 78%, rgba(255, 255, 255, 0.035)),
        radial-gradient(circle at 50% 72%, rgba(255, 77, 184, 0.14), transparent 38%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.026) 0 1px, transparent 1px 9px),
        linear-gradient(180deg, #151417, #08080a 84%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -18px 34px rgba(0, 0, 0, 0.68),
        0 10px 32px rgba(0, 0, 0, 0.36);
      isolation: isolate;
    }

    #top-area::before {
      content: "";
      position: absolute;
      inset: 10px 12px 0;
      border: 1px solid rgba(255, 255, 255, 0.085);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background:
        linear-gradient(90deg, transparent 0 22%, rgba(0, 242, 255, 0.11) 22% 22.4%, transparent 22.4% 77.6%, rgba(255, 77, 184, 0.1) 77.6% 78%, transparent 78%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.038) 0 1px, transparent 1px 22px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.028) 0 1px, transparent 1px 18px);
      opacity: 0.5;
      pointer-events: none;
      z-index: -2;
    }

    #top-area::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 38%;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.82));
      pointer-events: none;
      z-index: 1;
    }

    #status-overlay {
      position: absolute;
      top: clamp(20px, 4vh, 42px);
      left: 50%;
      z-index: 3;
      width: min(360px, calc(100vw - 76px));
      transform: translateX(-50%);
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      pointer-events: none;
    }

    #phase-text {
      display: none;
      min-height: 16px;
      min-width: min(220px, 62vw);
      padding: 6px 14px 5px;
      border: 1px solid rgba(0, 242, 255, 0.26);
      border-radius: 4px;
      background:
        linear-gradient(180deg, rgba(0, 242, 255, 0.1), rgba(0, 0, 0, 0.46)),
        var(--sampler-screen);
      color: rgba(177, 255, 245, 0.9);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      box-shadow:
        inset 0 0 18px rgba(0, 242, 255, 0.12),
        0 0 18px rgba(0, 0, 0, 0.42);
    }

    #sound-wave {
      position: absolute;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.78;
      mix-blend-mode: screen;
    }

    #sound-wave::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 54%;
      width: min(82vw, 620px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.36), rgba(255, 77, 184, 0.28), transparent);
      box-shadow: 0 0 24px var(--accent-soft);
      transform: translate(-50%, -50%);
    }

    .wave-row {
      position: absolute;
      left: 50%;
      top: calc(54% + var(--y));
      width: min(90vw, 720px);
      height: var(--h);
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 8px,
          rgba(0, 242, 255, 0.16) 8px 11px,
          rgba(255, 77, 184, 0.12) 11px 13px,
          transparent 13px 22px
        ),
        linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.36), rgba(255, 77, 184, 0.18), transparent);
      filter: blur(var(--blur));
      opacity: var(--o);
      transform: translate(-50%, -50%) scaleY(0.52);
      transform-origin: center;
      transition: opacity 110ms ease-out, transform 110ms ease-out;
      animation: wave-scroll var(--speed) linear infinite;
      mask-image: radial-gradient(ellipse at center, #000 0 48%, transparent 74%);
    }

    .wave-row:nth-child(1) { --y: -78px; --h: 52px; --o: 0.18; --blur: 0.2px; --speed: 3.8s; }
    .wave-row:nth-child(2) { --y: -38px; --h: 68px; --o: 0.3; --blur: 0; --speed: 3.1s; }
    .wave-row:nth-child(3) { --y: 0px; --h: 88px; --o: 0.42; --blur: 0; --speed: 2.6s; }
    .wave-row:nth-child(4) { --y: 42px; --h: 66px; --o: 0.28; --blur: 0.2px; --speed: 3.3s; }
    .wave-row:nth-child(5) { --y: 82px; --h: 48px; --o: 0.16; --blur: 0.4px; --speed: 4.2s; }

    #char-container {
      position: relative;
      z-index: 2;
      width: min(66vw, 360px);
      max-height: 100%;
      display: grid;
      place-items: end center;
      transform: translate3d(0, 26px, 0) scale(1.5);
      transform-origin: center bottom;
      backface-visibility: hidden;
      will-change: transform;
    }

    #char-img {
      width: 100%;
      max-height: min(37dvh, 380px);
      object-fit: contain;
      object-position: center bottom;
      transform: translateZ(0);
      filter:
        drop-shadow(0 0 9px rgba(255, 77, 184, 0.34))
        drop-shadow(0 0 18px var(--accent-soft));
    }

    #char-container.absorbing #char-img {
      animation: char-absorb-glow 360ms ease-out both;
    }

    #bottom-area {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-content: start;
      gap: clamp(8px, 1.5vh, 14px);
      padding: clamp(10px, 1.8vh, 18px) clamp(14px, 4vw, 32px) max(12px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 22% 20%, rgba(0, 242, 255, 0.08), transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(255, 77, 184, 0.07), transparent 22%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 16px),
        linear-gradient(180deg, #151518, #060606 74%);
      box-shadow: inset 0 16px 32px rgba(0, 0, 0, 0.48);
      isolation: isolate;
    }

    #bottom-area::before {
      content: "";
      position: absolute;
      inset: 7px clamp(8px, 2vw, 18px) 6px;
      z-index: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background:
        radial-gradient(circle at 8% 7%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 7%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 8% 93%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 93%, rgba(255, 255, 255, 0.12) 0 2px, transparent 3px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 30% 72%, rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }

    #bottom-area::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.58);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    body[data-phase="analyze"] #bottom-area::after {
      opacity: 1;
    }

    #bottom-area > * {
      position: relative;
      z-index: 1;
    }

    .stats-bar {
      width: min(320px, var(--board-size));
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: clamp(7px, 1.1vh, 9px) 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 42%),
        linear-gradient(135deg, rgba(0, 242, 255, 0.08), rgba(255, 77, 184, 0.04)),
        #111114;
      text-align: center;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -12px 18px rgba(0, 0, 0, 0.46),
        0 9px 18px rgba(0, 0, 0, 0.28);
    }

    .stat::before {
      content: "";
      position: absolute;
      left: 9px;
      top: 9px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      opacity: 0.82;
    }

    .stat::after {
      content: "";
      position: absolute;
      right: 9px;
      top: 9px;
      width: 28px;
      height: 5px;
      background:
        linear-gradient(90deg, var(--accent) 0 18%, transparent 18% 28%, var(--accent) 28% 46%, transparent 46% 56%, rgba(255, 77, 184, 0.9) 56% 74%, transparent 74%);
      opacity: 0.42;
    }

    .stat span {
      display: block;
      color: rgba(205, 214, 215, 0.72);
      font-size: 10px;
      line-height: 1.2;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      color: rgba(188, 255, 246, 0.94);
      font-size: clamp(19px, 4.8vw, 26px);
      font-weight: 400;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 12px rgba(0, 242, 255, 0.26);
    }

    .sound-stat {
      display: grid;
      place-items: center;
      min-height: 56px;
      padding-inline: 9px;
    }

    .sound-wave-icon {
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 32px;
      --bass-hit: 1.04;
      --bass-opacity: 0.9;
    }

    .sound-wave-icon span {
      width: 6px;
      height: var(--wave-h);
      min-height: 8px;
      background:
        repeating-linear-gradient(
          to top,
          var(--accent) 0 5px,
          transparent 5px 8px
        );
      filter: drop-shadow(0 0 8px var(--accent-soft));
      opacity: 0.42;
      transform-origin: bottom;
      transform: scaleY(0.34);
    }

    body[data-bass="strong"] .sound-wave-icon {
      --bass-hit: 1.22;
      --bass-opacity: 1;
    }

    body[data-pulse="1"] .sound-wave-icon span {
      animation: bgm-bass-hit 240ms cubic-bezier(0.18, 0.82, 0.2, 1) both;
    }

    .sound-wave-icon span:nth-child(1) { --wave-h: 18px; animation-delay: 18ms; }
    .sound-wave-icon span:nth-child(2) { --wave-h: 28px; animation-delay: 8ms; }
    .sound-wave-icon span:nth-child(3) { --wave-h: 14px; animation-delay: 28ms; }
    .sound-wave-icon span:nth-child(4) { --wave-h: 32px; animation-delay: 0ms; }
    .sound-wave-icon span:nth-child(5) { --wave-h: 22px; animation-delay: 14ms; }

    .beat-dots {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-top: 7px;
    }

    .beat-dots span {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: rgba(188, 255, 246, 0.15);
      border: 1px solid rgba(188, 255, 246, 0.26);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.42);
      transition: background 80ms ease, box-shadow 80ms ease, transform 80ms ease, opacity 80ms ease;
      opacity: 0.52;
    }

    .beat-dots[data-beat="0"] span:nth-child(1),
    .beat-dots[data-beat="1"] span:nth-child(2),
    .beat-dots[data-beat="2"] span:nth-child(3),
    .beat-dots[data-beat="3"] span:nth-child(4) {
      background: var(--accent);
      border-color: rgba(255, 255, 255, 0.72);
      box-shadow:
        0 0 12px var(--accent),
        0 0 26px var(--accent-soft),
        inset 0 0 8px rgba(255, 255, 255, 0.35);
      opacity: 1;
      transform: scale(1.18);
      animation: beat-dot-flash 220ms ease-out both;
    }

    #score-line {
      position: absolute;
      left: 50%;
      bottom: clamp(6px, 1.6vh, 14px);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: min(360px, 76vw);
      padding: 0;
      pointer-events: none;
      mix-blend-mode: normal;
      opacity: 1;
      transform: translateX(-50%);
    }

    #score-line span {
      display: block;
      color: rgba(255, 255, 255, 0.58);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 0, 0, 0.86);
    }

    #score-line strong {
      color: rgba(188, 255, 246, 0.98);
      font-size: clamp(34px, 8vw, 56px);
      font-weight: 700;
      line-height: 0.82;
      font-variant-numeric: tabular-nums;
      text-align: center;
      text-shadow:
        0 0 12px rgba(0, 242, 255, 0.74),
        0 0 30px rgba(255, 77, 184, 0.36),
        0 4px 18px rgba(0, 0, 0, 0.92);
    }

    #analyze-target {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 8px;
      color: var(--muted);
      opacity: 0;
      pointer-events: none;
      text-transform: uppercase;
      transition: opacity 160ms ease;
    }

    body[data-phase="analyze"] #analyze-target {
      opacity: 1;
    }

    #analyze-target span {
      font-size: 11px;
      line-height: 1.2;
      text-shadow: 0 0 18px rgba(0, 0, 0, 0.72);
    }

    #analyze-target strong {
      color: var(--accent);
      font-size: clamp(92px, 24vh, 168px);
      font-weight: 700;
      line-height: 0.78;
      text-align: center;
      text-shadow: 0 0 24px var(--accent-soft), 0 0 56px rgba(0, 0, 0, 0.86);
      transform: translateY(0) scale(1);
      transition: transform 105ms ease-out;
      font-variant-numeric: tabular-nums;
    }

    #grid {
      width: var(--board-size);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: clamp(6px, min(1.8vw, 1.15vh), 10px);
      padding: clamp(10px, min(3vw, 1.9vh), 18px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: url("assets/board-bg.png") center / 100% 100% no-repeat;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    .board-wrap {
      position: relative;
      width: var(--board-size);
    }

    #miss-gauge,
    #time-gauge {
      position: absolute;
      top: 50%;
      width: clamp(20px, 3.6vw, 26px);
      height: min(250px, calc(var(--board-size) * 0.58));
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 34% 72%, rgba(255, 255, 255, 0.05)),
        #101012;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -16px 24px rgba(0, 0, 0, 0.46),
        0 12px 26px rgba(0, 0, 0, 0.34);
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 6px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    #miss-gauge {
      right: clamp(-42px, -5.8vw, -28px);
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    #time-gauge {
      left: clamp(-42px, -5.8vw, -28px);
      overflow: hidden;
      display: flex;
      align-items: end;
    }

    #time-gauge-fill {
      width: 100%;
      height: var(--time-left, 100%);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(188, 255, 246, 0.98), var(--accent), rgba(0, 141, 156, 0.86));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        0 0 14px rgba(0, 242, 255, 0.5);
      transition: height 120ms linear, background 160ms ease, box-shadow 160ms ease;
    }

    body[data-time-low="1"] #time-gauge-fill {
      background:
        linear-gradient(180deg, rgba(255, 224, 102, 0.98), rgba(255, 77, 109, 0.94));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 0 16px rgba(255, 77, 109, 0.62);
    }

    .miss-gauge-segment {
      border-radius: 999px;
      background:

    }

    @keyframes bgm-bass-hit {
      0% {
        transform: scaleY(0.32);
        opacity: 0.42;
      }

      36% {
        transform: scaleY(var(--bass-hit));
        opacity: var(--bass-opacity);
        filter:
          drop-shadow(0 0 8px var(--accent-soft))
          drop-shadow(0 0 14px var(--accent));
      }

      100% {
        transform: scaleY(0.42);
        opacity: 0.5;

    @keyframes miss-danger-beat {
      0% {
        transform: scale(1);
        opacity: var(--miss-danger-opacity, 0.34);
        filter: blur(18px) saturate(1.12);
      }

      42% {
        transform: scale(var(--miss-danger-scale, 1.045));
        opacity: calc(var(--miss-danger-opacity, 0.34) + 0.12);
        filter: blur(20px) saturate(1.45);
      }

      100% {
        transform: scale(1);
        opacity: var(--miss-danger-opacity, 0.34);
        filter: blur(16px) saturate(1.18);
      }
    }

    @keyframes soul-absorb {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate3d(0, 0, 0) scale(0.42);
        filter: brightness(1.8) blur(0.2px);
      }

      16% {
        opacity: 1;
        transform: translate(-50%, -50%) translate3d(0, -10px, 0) scale(1.05);
        filter: brightness(2) blur(0);
      }

      64% {
        opacity: 0.95;
        transform: translate(-50%, -50%) translate3d(var(--mx), var(--my), 0) scale(0.72);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate3d(var(--tx), var(--ty), 0) scale(0.12);
        filter: brightness(2.5) blur(1.6px);
      }
    }

    @keyframes soul-ring {
      0% { transform: scale(0.3); opacity: 0.75; }
      100% { transform: scale(2.6); opacity: 0; }
    }

    @keyframes char-absorb-glow {
      0% {
        filter:
          drop-shadow(0 0 9px rgba(255, 77, 184, 0.34))
          drop-shadow(0 0 18px var(--accent-soft));
      }

      42% {
        filter:
          drop-shadow(0 0 16px rgba(255, 255, 255, 0.52))
          drop-shadow(0 0 32px var(--accent))
          drop-shadow(0 0 48px rgba(255, 77, 184, 0.36));
      }

      100% {
        filter:
          drop-shadow(0 0 9px rgba(255, 77, 184, 0.34))
          drop-shadow(0 0 18px var(--accent-soft));
      }
    }

    @keyframes reject {
      0%, 100% { transform: translateX(0); }
      28% { transform: translateX(-5px); }
      56% { transform: translateX(5px); }
    }

    @keyframes feedback {
      0% { opacity: 0; transform: translate(-50%, 10px) scale(0.94); }
      18% { opacity: 1; transform: translate(-50%, 0) scale(1.05); }
      72% { opacity: 1; transform: translate(-50%, -6px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -20px) scale(0.98); }
    }

    @keyframes result-enter {
      0% { opacity: 0; transform: translateY(20px) scale(0.92); filter: brightness(1.3); }
      46% { opacity: 1; transform: translateY(-4px) scale(1.025); filter: brightness(1.75); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
    }

    @keyframes rank-reveal {
      0% { opacity: 0; transform: translate3d(-10px, 6px, 0) scale(0.72); filter: brightness(2.2) contrast(1.4); }
      16% { opacity: 1; transform: translate3d(12px, -4px, 0) scale(1.18); }
      30% { transform: translate3d(-8px, 3px, 0) scale(0.98); }
      48% { transform: translate3d(5px, -2px, 0) scale(1.08); }
      100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: brightness(1) contrast(1); }
    }

    @keyframes char-beat-bounce {
      0% { transform: translate3d(0, 26px, 0) scale(1.5); }
      42% { transform: translate3d(0, 16px, 0) scale(1.515); }
      100% { transform: translate3d(0, 26px, 0) scale(1.5); }
    }

    @keyframes wave-scroll {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 132px 0, 0 0; }
    }

    @keyframes glitch-noise {
      0% { transform: translate3d(-2%, -1%, 0); opacity: 0.38; }
      50% { transform: translate3d(2%, 1%, 0); opacity: 0.66; }
      100% { transform: translate3d(-1%, 2%, 0); opacity: 0.48; }
    }

    @keyframes glitch-main {
      0%, 100% { transform: translate3d(0, 0, 0); }
      20% { transform: translate3d(-2px, 1px, 0); }
      40% { transform: translate3d(2px, -1px, 0); }
      60% { transform: translate3d(-1px, -1px, 0); }
      80% { transform: translate3d(1px, 1px, 0); }
    }

    @keyframes glitch-slice-a {
      0%, 100% { clip-path: inset(0 0 58% 0); }
      50% { clip-path: inset(18% 0 36% 0); }
    }

    @keyframes glitch-slice-b {
      0%, 100% { clip-path: inset(46% 0 0 0); }
      50% { clip-path: inset(66% 0 8% 0); }
    }

    @keyframes glitch-burst {
      0% { transform: translate3d(0, 0, 0) scale(0.94); filter: brightness(1); }
      45% { transform: translate3d(8px, -3px, 0) scale(1.08); filter: brightness(1.45); }
      100% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1); }
    }

    @media (max-height: 720px) {
      #char-container {
        width: min(54vw, 310px);
      }

      #char-img {
        max-height: min(35dvh, 310px);
      }

      #status-overlay {
        top: 12px;
      }

      #analyze-target strong {
        font-size: clamp(76px, 20vh, 126px);
      }
    }

    @media (max-width: 420px) {
      .stats-bar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #miss-gauge {
        right: 6px;
        width: 18px;
        height: min(210px, calc(var(--board-size) * 0.52));
        padding: 5px;
        gap: 5px;
      }

      #time-gauge {
        left: 6px;
        width: 18px;
        height: min(210px, calc(var(--board-size) * 0.52));
        padding: 5px;
      }

      .stat span {
        white-space: normal;
      }

      #analyze-target strong {
        font-size: clamp(78px, 28vw, 122px);
      }
    }
  </style>
</head>
<body data-phase="standby" data-evolution="0" data-pulse="0" data-beat="0" data-bass="normal" data-miss-danger="0">

      </div>
      <div class="stat">
        <span>Beat</span>
        <div class="beat-dots" id="beat-readout" data-beat="none" aria-label="Beat">

  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div id="modal-content">
      <h2 id="settings-title">Settings</h2>
      <div class="setting-row">
        <label for="bpm-slider">
          <span>BPM</span>
          <strong id="bpm-val">60</strong>
        </label>
        <input type="range" id="bpm-slider" min="60" max="180" value="60" step="10">
      </div>
      <div class="setting-row">
        <label for="audio-toggle">
          <span>Beat Audio</span>
          <input type="checkbox" id="audio-toggle" checked>
        </label>
      </div>

          <span>Reset</span>
        </label>

  <div id="result-overlay" role="dialog" aria-modal="true" aria-labelledby="result-title">

      <div class="result-content">
        <div>
          <div class="result-label" id="result-title">Result</div>
          <div class="result-score">
            <span class="result-label">Total Score</span>
            <strong id="result-score-value">0</strong>
          </div>
        </div>
        <div class="result-rank" id="result-rank-wrap" aria-live="polite">
          <strong id="result-rank-value" data-rank="-">-</strong>
        </div>
        <button class="primary" id="result-restart" type="button">RESTART</button>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 6;
    const CYCLE_BEATS = 4;
    const ANALYZE_BEATS = 2;
    const MAX_MISSES = 5;
    const TIME_LIMIT_MS = 120000;
    const RESULT_COUNT_MS = 1500;
    const BPM_MIN = 60;
    const BPM_MAX = 180;
    const SCORE_BPM_THRESHOLD = 5000;
    const SCORE_BPM_INCREMENT = 10;
    const CHARACTER_SWAP_SCORE = 20000;
    const CHARACTER_FINAL_SWAP_SCORE = 30000;
    const CHARACTER_SCORE_45000 = 45000;
    const CHARACTER_BASE_SRC = "assets/chara1.png";
    const CHARACTER_SCORE_SRC = "assets/chara1v2.png";
    const CHARACTER_FINAL_SRC = "assets/chara1-score30000.png";
    const CHARACTER_SCORE_45000_SRC = "assets/chara1-score45000.png";
    const CHARACTER_MISS_SRC = "assets/chara-miss.png";
    const TARGETS = [2, 3, 4, 5];
    const COLORS = [
      { id: "red", value: "#ff4d6d" },
      { id: "green", value: "#58ff9a" },
      { id: "blue", value: "#4d8dff" },
      { id: "yellow", value: "#ffe066" },
      { id: "violet", value: "#c77dff" }
    ];
    const CARDINAL_DIRS = [
      [-1, 0],
      [0, -1],
      [0, 1],
      [1, 0]
    ];
    const grid = document.getElementById("grid");
    const charContainer = document.getElementById("char-container");
    const charImg = document.getElementById("char-img");
    const startGate = document.getElementById("start-gate");
    const startBtn = document.getElementById("start-btn");
    const startText = document.getElementById("start-text");
    const resetBtn = document.getElementById("reset-btn");
    const settingsBtn = document.getElementById("settings-btn");
    const modal = document.getElementById("modal-overlay");
    const closeSettings = document.getElementById("close-settings");
    const bpmSlider = document.getElementById("bpm-slider");
    const bpmVal = document.getElementById("bpm-val");
    const audioToggle = document.getElementById("audio-toggle");
    const targetDisplay = document.getElementById("target-num");
    const phaseText = document.getElementById("phase-text");
    const feedback = document.getElementById("feedback");
    const beatReadout = document.getElementById("beat-readout");
    const scoreReadout = document.getElementById("score-readout");
    const soulLayer = document.getElementById("soul-layer");
    const missGauge = document.getElementById("miss-gauge");
    const missGaugeSegments = Array.from(document.querySelectorAll(".miss-gauge-segment"));
    const timeGauge = document.getElementById("time-gauge");
    const timeGaugeFill = document.getElementById("time-gauge-fill");
    const resultOverlay = document.getElementById("result-overlay");
    const resultPanel = document.getElementById("result-panel");
    const resultScoreValue = document.getElementById("result-score-value");
    const resultRankWrap = document.getElementById("result-rank-wrap");
    const resultRankValue = document.getElementById("result-rank-value");
    const resultRestart = document.getElementById("result-restart");

    let board = [];
    let bpm = BPM_MIN;
    let beatDuration = 60000 / bpm;
    let targetNum = 3;
    let gameActive = false;
    let resolving = false;
    let startedAt = 0;
    let timeStartedAt = 0;
    let remainingTimeMs = TIME_LIMIT_MS;
    let frameId = 0;
    let lastBeat = -1;
    let lastCycle = -1;
    let currentPhase = "standby";
    let score = 0;
    let scoreBpmStep = 0;
    let missCount = 0;
    let sync = 0;
    let evolution = 0;
    let audioContext = null;
    let musicMaster = null;
    let musicOutput = null;
    let noiseBuffer = null;
    let startSequenceActive = false;
    let resultActive = false;
    let resultTimer = 0;
    let resultFrameId = 0;
    let missImageTimer = 0;

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function createGrid() {
      board = Array.from({ length: SIZE }, () => (
        Array.from({ length: SIZE }, () => randomItem(COLORS).id)
      ));
      ensurePlayableGroup(targetNum);
      targetNum = choosePlayableTarget();
      targetDisplay.textContent = targetNum;
      renderGrid();
    }

    function renderGrid() {
      grid.innerHTML = "";
      board.forEach((row, rowIndex) => {
        row.forEach((colorId, colIndex) => {
          const color = COLORS.find((item) => item.id === colorId);
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = "cell";
          cell.dataset.row = rowIndex;
          cell.dataset.col = colIndex;
          cell.dataset.color = colorId;
          cell.style.setProperty("--cell-color", color.value);
          cell.setAttribute("aria-label", `${colorId} sync orb`);
          cell.addEventListener("click", handleCellClick);
          grid.appendChild(cell);
        });
      });
      updateGridLock();
    }

    function handleCellClick(event) {
      if (!gameActive || resolving || currentPhase !== "execute") return;

      const row = Number(event.currentTarget.dataset.row);
      const col = Number(event.currentTarget.dataset.col);
      const cluster = findCluster(row, col);
      const count = cluster.length;

      if (count < targetNum) {
        markCluster(cluster, "reject");
        sync = Math.max(0, sync - 6);
        flashMissCharacter();
        const ended = registerMiss();
        updateStats();
        if (ended) return;
        showFeedback(`NEED ${targetNum}`, "miss");
        playTone(120, 0.09, "sawtooth", 0.035);
        window.setTimeout(() => unmarkCluster(cluster, "reject"), 260);
        return;
      }

      resolving = true;
      updateGridLock();
      markCluster(cluster, "selected");
      markCluster(cluster, "clear");
      launchSoulAbsorb(cluster, event.currentTarget);

      if (count === targetNum) {
        score += 1000;
        sync += 34;
        showFeedback("PERFECT", "perfect");
        playTone(920, 0.14, "sine", 0.05);
      } else {
        score += 520 + (count - targetNum) * 80;
        sync += 20;
        showFeedback(`${count} CHAIN`, "great");
        playTone(560, 0.12, "triangle", 0.045);
      }

      registerSuccess();

      if (sync >= 100) {
        sync = 0;
        evolution = (evolution + 1) % 4;
        document.body.dataset.evolution = String(evolution);
      }

      applyScoreBpmBoost();
      updateStats();
      window.setTimeout(() => {
        cluster.forEach(({ row: r, col: c }) => {
          board[r][c] = randomItem(COLORS).id;
        });
        ensurePlayableGroup(targetNum);
        renderGrid();
        resolving = false;
        updateGridLock();
      }, 270);
    }

    function launchSoulAbsorb(cluster, sourceCell) {
      if (!soulLayer) return;

      const targetRect = charImg.getBoundingClientRect();
      const targetX = targetRect.left + targetRect.width * 0.52;
      const targetY = targetRect.top + targetRect.height * 0.42;
      const maxParticles = 14;
      const stride = Math.max(1, Math.ceil(cluster.length / maxParticles));
      let spawned = 0;

      charContainer.classList.remove("absorbing");
      void charContainer.offsetWidth;
      charContainer.classList.add("absorbing");
      window.setTimeout(() => {
        charContainer.classList.remove("absorbing");
      }, 380);

      cluster.forEach(({ row, col }, index) => {
        if (index % stride !== 0) return;

        const cell = grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
        if (!cell) return;

        spawnSoulParticle(cell, targetX, targetY, index, cluster.length);
        spawned += 1;
      });

      if (spawned === 0 && sourceCell) {
        spawnSoulParticle(sourceCell, targetX, targetY, 0, 1);
      }
    }

    function spawnSoulParticle(cell, targetX, targetY, index, total) {
      const rect = cell.getBoundingClientRect();
      const startX = rect.left + rect.width * 0.5;
      const startY = rect.top + rect.height * 0.5;
      const color = COLORS.find((item) => item.id === cell.dataset.color) || COLORS[0];
      const drift = (index - (total - 1) / 2) * 7;
      const midX = (targetX - startX) * 0.48 + drift;
      const midY = (targetY - startY) * 0.42 - 34 - (index % 3) * 8;
      const particle = document.createElement("span");

      particle.className = "soul-particle";
      particle.setAttribute("aria-hidden", "true");
      particle.style.setProperty("--sx", `${startX}px`);
      particle.style.setProperty("--sy", `${startY}px`);
      particle.style.setProperty("--tx", `${targetX - startX}px`);
      particle.style.setProperty("--ty", `${targetY - startY}px`);
      particle.style.setProperty("--mx", `${midX}px`);
      particle.style.setProperty("--my", `${midY}px`);
      particle.style.setProperty("--soul-color", color.value);
      particle.style.setProperty("--soul-size", `${9 + (index % 3) * 2}px`);
      particle.style.setProperty("--soul-delay", `${Math.min(index, 14) * 18}ms`);
      particle.style.setProperty("--soul-speed", `${460 + (index % 4) * 34}ms`);
      particle.style.setProperty("--soul-tilt", `${-28 + (index % 5) * 12}deg`);
      soulLayer.appendChild(particle);
      soulLayer.dataset.spawned = String(Number(soulLayer.dataset.spawned || 0) + 1);
      window.setTimeout(() => particle.remove(), 820);
    }

    function findCluster(startRow, startCol) {
      const color = board[startRow][startCol];
      const dirs = CARDINAL_DIRS;
      const stack = [[startRow, startCol]];
      const visited = new Set();
      const cluster = [];

      while (stack.length) {
        const [row, col] = stack.pop();
        const key = `${row},${col}`;
        if (visited.has(key)) continue;
        visited.add(key);
        if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) continue;
        if (board[row][col] !== color) continue;

        cluster.push({ row, col });
        dirs.forEach(([dr, dc]) => stack.push([row + dr, col + dc]));
      }

      return cluster;
    }

    function markCluster(cluster, className) {
      cluster.forEach(({ row, col }) => {
        const cell = grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
        if (cell) cell.classList.add(className);
      });
    }

    function unmarkCluster(cluster, className) {
      cluster.forEach(({ row, col }) => {
        const cell = grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
        if (cell) cell.classList.remove(className);
      });
    }

    function updateMissGauge() {
      const danger = Math.max(0, missCount - 2);
      const dangerOpacity = danger > 0 ? 0.18 + danger * 0.15 : 0;

      missGauge.setAttribute("aria-valuenow", String(missCount));
      missGaugeSegments.forEach((segment, index) => {
        segment.classList.toggle("active", index >= MAX_MISSES - missCount);
      });
      document.body.dataset.missDanger = danger > 0 ? "1" : "0";
      document.body.style.setProperty("--miss-danger-opacity", String(dangerOpacity));
      document.body.style.setProperty("--miss-danger-scale", String(1 + danger * 0.022));
    }

    function updateTimeGauge() {
      const ratio = Math.max(0, Math.min(1, remainingTimeMs / TIME_LIMIT_MS));
      const secondsLeft = Math.ceil(remainingTimeMs / 1000);

      timeGaugeFill.style.setProperty("--time-left", `${ratio * 100}%`);
      timeGauge.setAttribute("aria-valuenow", String(secondsLeft));
      document.body.dataset.timeLow = ratio <= 0.2 && gameActive ? "1" : "0";
    }

    function registerMiss() {
      missCount = Math.min(MAX_MISSES, missCount + 1);
      updateMissGauge();

      if (missCount >= MAX_MISSES) {
        finishGame();
        return true;
      }

      return false;
    }

    function registerSuccess() {
      if (missCount <= 0) return;
      missCount -= 1;
      updateMissGauge();
    }

    function finishGame() {
      if (resultActive) return;

      gameActive = false;
      resolving = false;
      resultActive = true;
      cancelAnimationFrame(frameId);
      updateTimeGauge();
      setPhase("finish");
      updateGridLock();
      showFeedback("FINISH!", "perfect");
      playFinishCue();
      window.clearTimeout(resultTimer);
      resultTimer = window.setTimeout(openResultOverlay, 950);
    }

    function getRank(totalScore) {
      if (totalScore >= 55000) return "S";
      if (totalScore >= 40000) return "A";
      if (totalScore >= 20000) return "B";
      return "C";
    }

    function openResultOverlay() {
      const rank = getRank(score);

      resultPanel.dataset.rank = rank;
      resultScoreValue.textContent = "0";
      resultRankWrap.classList.remove("visible");
      resultRankWrap.dataset.visible = "0";
      resultRankWrap.removeAttribute("style");
      resultRankValue.textContent = "-";
      resultRankValue.dataset.rank = "-";
      resultOverlay.classList.add("open");
      animateResultScore(score, rank);
    }

    function animateResultScore(finalScore, rank) {
      const started = performance.now();
      cancelAnimationFrame(resultFrameId);

      function step(now) {
        const progress = Math.min(1, (now - started) / RESULT_COUNT_MS);
        const eased = 1 - ((1 - progress) ** 3);
        const value = Math.round(finalScore * eased);

        resultScoreValue.textContent = value.toLocaleString("en-US");

        if (progress < 1) {
          resultFrameId = requestAnimationFrame(step);
          return;
        }

        resultScoreValue.textContent = finalScore.toLocaleString("en-US");
        revealRank(rank);
      }

      resultFrameId = requestAnimationFrame(step);
    }

    function revealRank(rank) {
      resultRankValue.textContent = rank;
      resultRankValue.dataset.rank = rank;
      resultRankWrap.classList.remove("visible");
      resultRankWrap.dataset.visible = "0";
      resultRankWrap.removeAttribute("style");
      void resultRankWrap.offsetWidth;
      resultRankWrap.classList.add("visible");
      resultRankWrap.dataset.visible = "1";
      resultRankWrap.style.opacity = "1";
      resultRankWrap.style.transform = "scale(1)";
      resultRankWrap.style.animation = "rank-reveal var(--result-rank-speed, 720ms) steps(3, end) both";
      playRankCue(rank);
    }

    function closeResultOverlay() {
      resultOverlay.classList.remove("open");
      window.clearTimeout(resultTimer);
      cancelAnimationFrame(resultFrameId);
      resultRankWrap.classList.remove("visible");
      resultRankWrap.dataset.visible = "0";
      resultRankWrap.removeAttribute("style");
    }

    function restartFromResult() {
      closeResultOverlay();
      resetRunProgress();
      createGrid();
      setStartText("START");
      startGate.classList.remove("hidden", "counting");
      beginStartSequence();
    }

    function playFinishCue() {
      playTone(440, 0.09, "sawtooth", 0.034);
      window.setTimeout(() => playTone(660, 0.1, "triangle", 0.036), 110);
      window.setTimeout(() => playTone(990, 0.13, "sine", 0.04), 230);
    }

    function playRankCue(rank) {
      const cues = {
        S: [880, 1108, 1320, 1760],
        A: [660, 880, 1320],
        B: [523, 784],
        C: [392]
      };
      (cues[rank] || cues.C).forEach((frequency, index) => {
        window.setTimeout(() => playTone(frequency, 0.16, "sawtooth", 0.034), index * 70);
      });
    }

    function largestGroupSize() {
      let largest = 0;
      const seen = new Set();

      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const key = `${row},${col}`;
          if (seen.has(key)) continue;
          const cluster = findCluster(row, col);
          cluster.forEach(({ row: r, col: c }) => seen.add(`${r},${c}`));
          largest = Math.max(largest, cluster.length);
        }
      }

      return largest;
    }

    function choosePlayableTarget() {
      const largest = largestGroupSize();
      const candidates = TARGETS.filter((target) => target <= largest);

      if (candidates.length) {
        return randomItem(candidates);
      }

      ensurePlayableGroup(TARGETS[0]);
      return TARGETS[0];
    }

    function ensurePlayableGroup(target) {
      if (largestGroupSize() >= target) return;

      const color = randomItem(COLORS).id;
      const horizontal = Math.random() > 0.5;
      const row = horizontal
        ? Math.floor(Math.random() * SIZE)
        : Math.floor(Math.random() * (SIZE - target + 1));
      const col = horizontal
        ? Math.floor(Math.random() * (SIZE - target + 1))
        : Math.floor(Math.random() * SIZE);

      for (let offset = 0; offset < target; offset += 1) {
        const nextRow = horizontal ? row : row + offset;
        const nextCol = horizontal ? col + offset : col;

        board[nextRow][nextCol] = color;
      }

      if (largestGroupSize() < target) {
        ensurePlayableGroup(target);
      }
    }

    function setStartText(text) {
      startText.textContent = text;
      startText.dataset.text = text;
      startText.classList.remove("burst");
      void startText.offsetWidth;
      startText.classList.add("burst");
    }

    function primeAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      setupMusicGraph();
      audioContext.resume();
    }

    function beginStartSequence() {
      if (gameActive || startSequenceActive) return;

      const sequence = ["3", "2", "1", "RE:CODE"];
      let index = 0;

      if (resultActive) {
        resetRunProgress();
      }

      startSequenceActive = true;
      startBtn.disabled = true;
      startGate.classList.add("counting");
      primeAudio();

      function step() {
        setStartText(sequence[index]);
        index += 1;

        if (index < sequence.length) {
          window.setTimeout(step, 720);
          return;
        }

        window.setTimeout(() => {
          startGate.classList.add("hidden");
          startGate.classList.remove("counting");
          startBtn.disabled = false;
          startSequenceActive = false;
          startGame();
        }, 720);
      }

      step();
    }

    function startGame() {
      primeAudio();

      gameActive = true;
      resolving = false;
      startedAt = performance.now();
      timeStartedAt = startedAt;
      remainingTimeMs = TIME_LIMIT_MS;
      lastBeat = -1;
      lastCycle = -1;
      updateTimeGauge();
      setPhase("analyze");
      createGrid();
      cancelAnimationFrame(frameId);
      frameId = requestAnimationFrame(tick);
    }

    function resetRunProgress() {
      score = 0;
      scoreBpmStep = 0;
      missCount = 0;
      remainingTimeMs = TIME_LIMIT_MS;
      timeStartedAt = 0;
      sync = 0;
      evolution = 0;
      resultActive = false;
      targetNum = 3;
      targetDisplay.textContent = "--";
      updateBeatDisplay(null);
      document.body.dataset.evolution = "0";
      startBtn.setAttribute("aria-label", "Start");
      setBpm(BPM_MIN);
      updateMissGauge();
      updateTimeGauge();
      updateStats();
    }

    function resetGame() {
      gameActive = false;
      resolving = false;
      cancelAnimationFrame(frameId);
      score = 0;
      scoreBpmStep = 0;
      missCount = 0;
      remainingTimeMs = TIME_LIMIT_MS;
      timeStartedAt = 0;
      sync = 0;
      evolution = 0;
      resultActive = false;
      lastBeat = -1;
      lastCycle = -1;
      targetNum = 3;
      targetDisplay.textContent = "--";
      updateBeatDisplay(null);
      document.body.dataset.evolution = "0";
      window.clearTimeout(missImageTimer);
      closeResultOverlay();
      setBpm(BPM_MIN);
      setPhase("standby");
      startSequenceActive = false;
      setStartText("START");
      startBtn.disabled = false;
      startBtn.setAttribute("aria-label", "Start");
      startGate.classList.remove("hidden", "counting");
      createGrid();
      updateMissGauge();
      updateTimeGauge();
      updateStats();
      showFeedback("RESET", "great");
    }

    function tick(now) {
      if (!gameActive) return;

      const beatPosition = Math.max(0, (now - startedAt) / beatDuration);
      const totalBeat = Math.floor(beatPosition);
      const beatInCycle = totalBeat % CYCLE_BEATS;
      const cycle = Math.floor(totalBeat / CYCLE_BEATS);
      const phase = beatInCycle < ANALYZE_BEATS ? "analyze" : "execute";
      remainingTimeMs = Math.max(0, TIME_LIMIT_MS - (now - timeStartedAt));
      updateTimeGauge();

      if (remainingTimeMs <= 0) {
        finishGame();
        return;
      }

      if (cycle !== lastCycle) {
        lastCycle = cycle;
        targetNum = choosePlayableTarget();
        targetDisplay.textContent = targetNum;
      }

      if (phase !== currentPhase) {
        setPhase(phase);
      }

      if (totalBeat !== lastBeat) {
        lastBeat = totalBeat;
        pulseBeat(beatInCycle);
        updateBeatDisplay(beatInCycle);
      }

      frameId = requestAnimationFrame(tick);
    }

    function updateBeatDisplay(beatInCycle) {
      if (beatInCycle === null) {
        beatReadout.dataset.beat = "none";
        beatReadout.setAttribute("aria-label", "Beat standby");
        return;
      }

      const beat = beatInCycle % CYCLE_BEATS;
      beatReadout.dataset.beat = String(beat);
      beatReadout.setAttribute("aria-label", `Beat ${beat + 1} of 4`);
    }

    function setPhase(phase) {
      currentPhase = phase;
      document.body.dataset.phase = phase;

      if (phase === "analyze") {
        phaseText.textContent = "ANALYZE PHASE";
      } else if (phase === "execute") {
        phaseText.textContent = "EXECUTE PHASE";
      } else if (phase === "finish") {
        phaseText.textContent = "FINISH";
      } else {
        phaseText.textContent = "STANDBY";
      }

      updateGridLock();
    }

    function updateGridLock() {
      const locked = !gameActive || resolving || currentPhase !== "execute";
      grid.querySelectorAll(".cell").forEach((cell) => {
        cell.disabled = locked;
      });
    }

    function pulseBeat(beatInCycle) {
      document.body.dataset.beat = String(beatInCycle % CYCLE_BEATS);
      document.body.dataset.bass = beatInCycle % CYCLE_BEATS === 0 ? "strong" : "normal";
      document.body.dataset.pulse = "1";
      window.setTimeout(() => {
        document.body.dataset.pulse = "0";
      }, 180);

      charContainer.style.setProperty("--beat", beatInCycle + 1);
      playBeat(beatInCycle);
    }

    function setBpm(nextBpm) {
      const now = performance.now();
      const currentBeatPosition = gameActive ? (now - startedAt) / beatDuration : 0;
      bpm = Math.min(BPM_MAX, Math.max(BPM_MIN, Number(nextBpm)));
      beatDuration = 60000 / bpm;
      if (gameActive) {
        startedAt = now - currentBeatPosition * beatDuration;
      }
      bpmSlider.value = String(bpm);
      bpmVal.textContent = bpm;
    }

    function applyScoreBpmBoost() {
      const earnedStep = Math.floor(score / SCORE_BPM_THRESHOLD);

      while (scoreBpmStep < earnedStep) {
        scoreBpmStep += 1;
        setBpm(bpm + SCORE_BPM_INCREMENT);
      }
    }

    function updateStats() {
      updateCharacterImage();
      scoreReadout.textContent = score.toLocaleString("en-US");
    }

    function updateCharacterImage() {
      let nextSrc = CHARACTER_BASE_SRC;

      if (score >= CHARACTER_SCORE_45000) {
        nextSrc = CHARACTER_SCORE_45000_SRC;
      } else if (score >= CHARACTER_FINAL_SWAP_SCORE) {
        nextSrc = CHARACTER_FINAL_SRC;
      } else if (score >= CHARACTER_SWAP_SCORE) {
        nextSrc = CHARACTER_SCORE_SRC;
      }

      if (charImg.getAttribute("src") !== nextSrc) {
        charImg.src = nextSrc;
      }
    }

    function flashMissCharacter() {
      window.clearTimeout(missImageTimer);
      charImg.src = CHARACTER_MISS_SRC;
      missImageTimer = window.setTimeout(updateCharacterImage, 420);
    }

    function showFeedback(text, type) {
      feedback.textContent = text;
      feedback.className = "";
      feedback.classList.add(type, "show");
      window.setTimeout(() => {
        feedback.classList.remove("show");
      }, 820);
    }

    function setupMusicGraph() {
      if (musicMaster || !audioContext) return;

      const compressor = audioContext.createDynamicsCompressor();
      compressor.threshold.value = -10;
      compressor.knee.value = 16;
      compressor.ratio.value = 3;
      compressor.attack.value = 0.004;
      compressor.release.value = 0.12;

      musicMaster = audioContext.createGain();
      musicMaster.gain.value = 8;
      musicOutput = audioContext.createGain();
      musicOutput.gain.value = 3;
      musicMaster.connect(compressor);
      compressor.connect(musicOutput);
      musicOutput.connect(audioContext.destination);

      noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate, audioContext.sampleRate);
      const noise = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noise.length; i += 1) {
        noise[i] = Math.random() * 2 - 1;
      }

    }

    function musicStage() {
      return Math.min(12, Math.max(0, Math.floor((bpm - BPM_MIN) / SCORE_BPM_INCREMENT)));
    }

    function musicWidth(stage) {
      return Math.min(0.92, 0.18 + stage * 0.06);
    }

    function routeAudio(node, pan = 0) {
      const destination = musicMaster || audioContext.destination;
      if (audioContext.createStereoPanner) {
        const panner = audioContext.createStereoPanner();
        panner.pan.value = Math.max(-1, Math.min(1, pan));
        node.connect(panner);
        panner.connect(destination);
        return;
      }

      node.connect(destination);
    }

    function playBeat(beatInCycle) {
      if (!audioContext || !audioToggle.checked) return;

      const now = audioContext.currentTime;
      const stage = musicStage();
      const width = musicWidth(stage);
      const beatSeconds = beatDuration / 1000;
      const strong = beatInCycle === 0 || beatInCycle === 4;
      const energy = stage / 12;

      playKick(now, strong, stage);
      playBass(now, beatInCycle, stage, beatSeconds);
      playHat(now + beatSeconds * 0.5, 0.048, 0.018 + energy * 0.024, (beatInCycle % 2 ? -width : width));

      if (stage >= 2 || beatInCycle % 2 === 1) {
        playHat(now, 0.026, 0.01 + energy * 0.016, (beatInCycle % 2 ? width : -width) * 0.54);
      }

      if (stage >= 5) {
        playHat(now + beatSeconds * 0.25, 0.018, 0.006 + energy * 0.012, width * 0.82);
        playHat(now + beatSeconds * 0.75, 0.018, 0.006 + energy * 0.012, -width * 0.82);
      }

      if (beatInCycle === 2 || beatInCycle === 6) {
        playClap(now, stage, width);
      }

      if (stage >= 2) {
        playArp(now, beatInCycle, stage, beatSeconds, width);
      }

      if (stage >= 4 && strong) {
        playChord(now, beatInCycle, stage, beatSeconds, width);
      }

      if (stage >= 7 && beatInCycle % 4 === 3) {
        playSweep(now, stage, beatSeconds, width);
      }
    }

    function playKick(time, strong, stage) {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const energy = stage / 12;
      const startFreq = strong ? 96 + stage * 2.2 : 82 + stage * 1.8;
      const endFreq = strong ? 36 : 42;
      const volume = strong ? 0.12 + energy * 0.075 : 0.092 + energy * 0.052;

      osc.type = "sine";
      osc.frequency.setValueAtTime(startFreq, time);
      osc.frequency.exponentialRampToValueAtTime(endFreq, time + 0.11);
      gain.gain.setValueAtTime(volume, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.17);
      osc.connect(gain);
      routeAudio(gain);
      osc.start(time);
      osc.stop(time + 0.18);
    }

    function playBass(time, beatInCycle, stage, beatSeconds) {
      const notes = [0, 0, 5, 0, 7, 7, 3, 10];
      const energy = stage / 12;
      const octaveLift = stage >= 8 && beatInCycle % 4 === 3 ? 12 : 0;
      const frequency = 55 * (2 ** ((notes[beatInCycle] + octaveLift) / 12));
      const osc = audioContext.createOscillator();
      const filter = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();
      const duration = Math.min(0.34, beatSeconds * 0.54);

      osc.type = stage >= 3 ? "sawtooth" : "triangle";
      osc.frequency.setValueAtTime(frequency, time);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(260 + stage * 145, time);
      filter.Q.value = 4 + energy * 7;
      gain.gain.setValueAtTime(0.001, time);
      gain.gain.exponentialRampToValueAtTime(0.046 + energy * 0.076, time + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
      osc.connect(filter);
      filter.connect(gain);
      routeAudio(gain);
      osc.start(time);
      osc.stop(time + duration + 0.02);
    }

    function playHat(time, duration, volume, pan) {
      if (!noiseBuffer) return;

      const source = audioContext.createBufferSource();
      const filter = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();

      source.buffer = noiseBuffer;
      filter.type = "highpass";
      filter.frequency.value = 5600 + musicStage() * 260;
      gain.gain.setValueAtTime(volume, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
      source.connect(filter);
      filter.connect(gain);
      routeAudio(gain, pan);
      source.start(time);
      source.stop(time + duration);
    }

    function playClap(time, stage, width) {
      const energy = stage / 12;
      [0, 0.018, 0.038].forEach((offset, index) => {
        if (!noiseBuffer) return;

        const source = audioContext.createBufferSource();
        const filter = audioContext.createBiquadFilter();
        const gain = audioContext.createGain();
        const start = time + offset;

        source.buffer = noiseBuffer;
        filter.type = "bandpass";
        filter.frequency.value = 1350 + stage * 155;
        filter.Q.value = 1.1;
        gain.gain.setValueAtTime((0.026 + energy * 0.046) / (index + 1), start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.09);
        source.connect(filter);
        filter.connect(gain);
        routeAudio(gain, index % 2 ? width * 0.45 : -width * 0.45);
        source.start(start);
        source.stop(start + 0.1);
      });
    }

    function playArp(time, beatInCycle, stage, beatSeconds, width) {
      const rangeLift = stage >= 6 ? 12 : stage >= 3 ? 7 : 0;
      const sequence = [12, 19, 24, 27, 31, 27, 24, 19];
      const pan = (beatInCycle % 2 ? 1 : -1) * width;
      playPluck(time, sequence[beatInCycle] + rangeLift, stage, Math.min(0.16, beatSeconds * 0.32), pan);

      if (stage >= 5) {
        playPluck(
          time + beatSeconds * 0.5,
          sequence[(beatInCycle + 2) % sequence.length] + rangeLift,
          stage,
          Math.min(0.12, beatSeconds * 0.24),
          -pan
        );
      }

      if (stage >= 9) {
        playPluck(
          time + beatSeconds * 0.25,
          sequence[(beatInCycle + 4) % sequence.length] + rangeLift + 12,
          stage,
          Math.min(0.08, beatSeconds * 0.18),
          pan * 0.56
        );
      }
    }

    function playPluck(time, semitone, stage, duration, pan) {
      const osc = audioContext.createOscillator();
      const filter = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();
      const energy = stage / 12;
      const frequency = 110 * (2 ** (semitone / 12));

      osc.type = stage >= 6 ? "square" : "sawtooth";
      osc.frequency.setValueAtTime(frequency, time);
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(1200 + stage * 340, time);
      filter.Q.value = 4.8 + energy * 4;
      gain.gain.setValueAtTime(0.001, time);
      gain.gain.exponentialRampToValueAtTime(0.014 + energy * 0.042, time + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
      osc.connect(filter);
      filter.connect(gain);
      routeAudio(gain, pan);
      osc.start(time);
      osc.stop(time + duration + 0.02);
    }

    function playChord(time, beatInCycle, stage, beatSeconds, width) {
      const energy = stage / 12;
      const chord = beatInCycle === 0 ? [0, 7, 12, 19] : [5, 12, 17, 24];
      const duration = Math.min(0.92, beatSeconds * 1.72);

      chord.forEach((semitone, index) => {
        const osc = audioContext.createOscillator();
        const filter = audioContext.createBiquadFilter();
        const gain = audioContext.createGain();
        const frequency = 110 * (2 ** (semitone / 12));
        const pan = ((index - 1.5) / 1.5) * width;

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(frequency, time);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(980 + stage * 290, time);
        filter.Q.value = 1.15 + energy * 1.4;
        gain.gain.setValueAtTime(0.001, time);
        gain.gain.exponentialRampToValueAtTime(0.012 + energy * 0.03, time + 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
        osc.connect(filter);
        filter.connect(gain);
        routeAudio(gain, pan);
        osc.start(time);
        osc.stop(time + duration + 0.04);
      });
    }

    function playSweep(time, stage, beatSeconds, width) {
      if (!noiseBuffer) return;

      const source = audioContext.createBufferSource();
      const filter = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();
      const energy = stage / 12;
      const duration = Math.min(0.34, beatSeconds * 0.68);

      source.buffer = noiseBuffer;
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(520 + stage * 110, time);
      filter.frequency.exponentialRampToValueAtTime(5200 + stage * 470, time + duration);
      filter.Q.value = 8;
      gain.gain.setValueAtTime(0.001, time);
      gain.gain.exponentialRampToValueAtTime(0.018 + energy * 0.04, time + duration * 0.46);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
      source.connect(filter);
      filter.connect(gain);
      routeAudio(gain, (Math.random() > 0.5 ? 1 : -1) * width);
      source.start(time);
      source.stop(time + duration);
    }

    function playTone(frequency, duration, type, volume) {
      if (!audioContext || !audioToggle.checked) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = type;
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(volume, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
      osc.connect(gain);
      routeAudio(gain);
      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }

    function openSettings() {
      modal.classList.add("open");
      bpmSlider.focus();
    }

    function closeSettingsModal() {
      modal.classList.remove("open");
      settingsBtn.focus();
    }

    settingsBtn.addEventListener("click", openSettings);
    closeSettings.addEventListener("click", closeSettingsModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeSettingsModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("open")) {
        closeSettingsModal();
      }
    });
    bpmSlider.addEventListener("input", (event) => setBpm(event.target.value));
    startBtn.addEventListener("click", beginStartSequence);
    resultRestart.addEventListener("click", restartFromResult);
    resetBtn.addEventListener("click", () => {
      resetGame();
      closeSettingsModal();
    });

    createGrid();
    updateMissGauge();
    updateTimeGauge();
    updateStats();
  </script>
</body>
</html>
